<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../global.css">

</head>
<body>

    <main class="login-pagina">

        <div class="login-painel-esquerdo fundo-pontos">
            <a href="../../index.html" class="logo">Dev<span>Blog</span></a>

            <div>
                <div class="linha-principal"></div>
                <h2 class="login-frase">
                    Escreva.<br>
                    Publique.<br>
                    <span> Inspire.</span>
                </h2>
            </div>
            
            <p class="login-rodape-painel">
                Plataforma de blog para desenvolvedores - 2026
            </p>
        </div>

        <div class="login-painel-direito">
            <div class="login-form-card card-brilho">
                <h1 class="login-titulo">Bem vindo de volta</h1>
                <p class="login-subtitulo">Entre com sua conta para continuar</p>

                <form action="#" class="login-form">
                    <div class="campo-grupo">
                        <label for="email" class="campo-label">Email</label>
                        <input type="email" id="email" class="campo-input" placeholder="seu@email.com" required>
                    </div>

                    <div class="campo-grupo">
                        <label for="senha" class="campo-label">Senha</label>
                        <input type="password" id="senha" class="campo-input" placeholder="••••••••••" required>
                        <a href="#" class="login-esqueceu">Esqueceu a senha?</a>
                    </div>

                    <button class="btn-primario login-btn-submit" type="submit">
                         Entrar na conta 
                    </button>
                </form>

                    <p class="login-cadastro-link">
                        Ainda não tem conta? <a href="../cadastro/index.html">Criar sua conta</a>
                    </p>

            </div>
        </div>

    </main>
    
</body>
</html>
