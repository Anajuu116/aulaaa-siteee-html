<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../../global.css">
</head>
<body>
    
<div class="cadastro-pagina">

<header class="cadastro-header">
    <a href="../../index.html" class="logo">Dev<span>Blog</span></a>
    <a href="../login/index.html" class="cadastro-header-link">
        Já tenho uma conta <i class="fa fa-arrow-right" aria-hidden="true"></i>
    </a>
</header>

<main class="cadastro-corpo">
    <div class="cadastro-form-card">
        <h1 class="cadastro-titulo">Crie sua conta</h1>
        <p class="cadastro-subtitulo">
            Junte-se a centenas de devs que já escrevem no DevBlog
        </p>

        <form action="#" class="cadastro-form">
            <div class="campos-duplos">
                 <div class="campo-duplo">
                    <label class="campo-label"for="nome">Nome</label>
                    <input type="text" id="nome" class="campo-input" placeholder="João" required>
                 </div>
                 <div class="campo-duplo">
                    <label class="campo-label"for="sobrenome">Sobrenome</label>
                    <input type="text" id="sobrenome" class="campo-input" placeholder="Silva" required>
                 </div>
            </div>
                 <div class="campo-duplo">
                    <label class="campo-label"for="email">E-mail</label>
                    <input type="email" id="email" class="campo-input" placeholder="seu@email.com" required>
                 </div>

                  <div class="campo-duplo">
                    <label class="campo-label"for="senha">Senha</label>
                    <input type="password" id="senha" class="campo-input" placeholder="Mínimo 8 caracteres" required>
                 </div>

                  <div class="campo-duplo">
                    <label class="campo-label"for="confirmar">Confirmar senha</label>
                    <input type="password" id="confrimar" class="campo-input" placeholder="Repita a senha" required>
                 </div>

                <div class="cadastro-termos">
                    <input type="checkbox" id="termos" required/>
                    <label for="termos">
                        Eu concordo com os <a href="#">Termos de uso</a> e a 
                        <a href="#">Política de Privacidade</a> do DevBlog.
                    </label>
                </div>

                    <button class="btn-primario cadastro-btn-submit" type="submit">
                        Criar minha conta
                    </button>
                </form>

     <p class="cadastro-login-link">
        Já tem uma conta? <a href="../login/index.html">Entrar</a>
     </p>
              </div>
            </main>
         </div>
    </body>
</html>
